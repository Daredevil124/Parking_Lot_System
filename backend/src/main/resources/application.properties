server.port=8081

# Oracle Database Connection Properties
# Update these with your Oracle Cloud or local XE credentials
# Example for local XE: jdbc:oracle:thin:@localhost:1521/XEPDB1
# Example for Oracle Cloud (Wallet): jdbc:oracle:thin:@your_db_high?TNS_ADMIN=/path/to/wallet
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/FREEPDB1
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Show SQL Queries for Debugging
spring.jdbc.template.show-sql=true
