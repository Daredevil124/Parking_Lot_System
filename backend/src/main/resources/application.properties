server.port=8081

# Oracle Database Connection Properties
# Connected to local Docker Oracle Free (gvenzl/oracle-free:slim)
# Container: oracle-free | Port: 1521 | PDB: FREEPDB1
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=system
spring.datasource.password=ParkingPass1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Show SQL Queries for Debugging
spring.jdbc.template.show-sql=true
